global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: opa
    static_configs:
      - targets: [nhi-opa:8181]
    metrics_path: /metrics

  - job_name: anomaly-service
    static_configs:
      - targets: [nhi-anomaly:8000]
    metrics_path: /metrics

  - job_name: audit-api
    static_configs:
      - targets: [nhi-audit-api:8001]
    metrics_path: /metrics
