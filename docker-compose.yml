---
# NHI-Sentinel — Full Stack
# Brings up: Keycloak, Vault, PostgreSQL, OPA, LocalStack, Redis, Kafka, Prometheus, Grafana, Loki
# Start: docker compose up -d
# Stop:  docker compose down -v

name: nhi-sentinel

networks:
  nhi-net:
    driver: bridge

volumes:
  postgres-data:
  vault-data:
  keycloak-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:

  # ----------------------------------------------------------------
  # PostgreSQL — identity registry + audit store
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nhi-postgres
    networks: [nhi-net]
    environment:
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: audit
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d audit"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------
  # Redis — JTI replay cache, approval queue, rate limit counters
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nhi-redis
    networks: [nhi-net]
    command: redis-server --save ""  # in-memory only (no persistence needed)
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------------
  # HashiCorp Vault — dev mode (single-node, in-memory, auto-unsealed)
  # Production: replace with integrated storage + TLS
  # ----------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.16
    container_name: nhi-vault
    networks: [nhi-net]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
      - ./infra/vault/vault-init.sh:/vault-init.sh:ro
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ----------------------------------------------------------------
  # Vault initializer — enables KV v2 secrets engine
  # Runs once, then exits
  # ----------------------------------------------------------------
  vault-init:
    image: hashicorp/vault:1.16
    container_name: nhi-vault-init
    networks: [nhi-net]
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: dev-root-token
    entrypoint: ["/bin/sh", "/vault-init.sh"]
    volumes:
      - ./infra/vault/vault-init.sh:/vault-init.sh:ro
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"

  # ----------------------------------------------------------------
  # Keycloak — OIDC identity provider for NHI service principals
  # Dev mode: no TLS, embedded H2 database
  # ----------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nhi-keycloak
    networks: [nhi-net]
    environment:
      KC_DB: dev-mem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: ["start-dev", "--http-port=8080"]
    ports:
      - "8080:8080"
    healthcheck:
      # /realms/master is the reliable readiness signal on port 8080.
      # KC_HEALTH_ENABLED uses port 9000 (management port) which is not
      # exposed here; checking the OIDC master realm endpoint instead.
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ----------------------------------------------------------------
  # Keycloak realm initializer — creates the 'nhi' realm
  # ----------------------------------------------------------------
  keycloak-init:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nhi-keycloak-init
    networks: [nhi-net]
    entrypoint: ["/bin/bash", "/keycloak-init.sh"]
    volumes:
      - ./infra/keycloak/keycloak-init.sh:/keycloak-init.sh:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  # ----------------------------------------------------------------
  # Open Policy Agent — policy decision point (sidecar pattern)
  # ----------------------------------------------------------------
  opa:
    image: openpolicyagent/opa:latest-rootless
    container_name: nhi-opa
    networks: [nhi-net]
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./policy/rego:/policies:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ----------------------------------------------------------------
  # LocalStack — AWS service simulation (S3, EC2, IAM, STS, CloudTrail)
  # ----------------------------------------------------------------
  localstack:
    image: localstack/localstack:3
    container_name: nhi-localstack
    networks: [nhi-net]
    environment:
      SERVICES: s3,ec2,iam,sts,cloudtrail
      DEBUG: "0"
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"running\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ----------------------------------------------------------------
  # Apache Kafka (KRaft mode — no ZooKeeper)
  # Hosts the audit.events topic consumed by the anomaly service
  # ----------------------------------------------------------------
  kafka:
    image: bitnami/kafka:latest
    container_name: nhi-kafka
    networks: [nhi-net]
    environment:
      # KRaft mode — no ZooKeeper required
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: "168"   # 7 days
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    ports:
      - "9094:9094"   # external (host) access
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------------
  # Prometheus — metrics scrape + time-series store
  # ----------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: nhi-prometheus
    networks: [nhi-net]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus-data:/prometheus
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy | grep -q 'Prometheus Server is Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------
  # Grafana Loki — log aggregation (structured JSON logs from all services)
  # ----------------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: nhi-loki
    networks: [nhi-net]
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - loki-data:/loki
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q 'ready'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ----------------------------------------------------------------
  # Grafana — dashboards for agent actions, anomaly scores, approvals
  # Provisioned with dashboards-as-code from ./dashboards/
  # ----------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: nhi-grafana
    networks: [nhi-net]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
