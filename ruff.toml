target-version = "py312"
line-length = 100

[lint]
select = ["E", "W", "F", "I"]
ignore = ["E501"]

[lint.isort]
known-first-party = [
    "agents",
    "identity",
    "pep",
    "policy",
    "audit",
    "anomaly",
    "approval",
    "cloud_sim",
    "attack_sim",
]

[format]
quote-style = "double"
indent-style = "space"
